<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>Canvia el terra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family:"Segoe UI",Arial,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin:0;
  padding:20px;
  color:white;
  overflow-x:hidden;
}

/* Marca subtil de fons */
body::before{
  content:"SURFACE AI";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  font-weight:900;
  letter-spacing:12px;
  color:rgba(255,255,255,0.04);
  pointer-events:none;
  z-index:0;
}

/* =========================
   PORTADA
========================= */
#introScreen{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
    url('materials/rajola_gris1.jpg') center/cover no-repeat;
  transition:opacity .5s ease, visibility .5s ease;
}

#introScreen.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

/* =========================
   LOGIN / VERIFY OVERLAY
========================= */
#authScreen{
  position:fixed;
  inset:0;
  z-index:9998;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
}

#authScreen.show{
  display:flex;
}

.auth-card{
  width:min(520px, 100%);
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:28px 22px;
  backdrop-filter:blur(10px);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  text-align:center;
}

.auth-title{
  margin:0 0 8px 0;
  font-size:28px;
  font-weight:900;
}

.auth-sub{
  margin:0 0 18px 0;
  color:#dfefff;
  line-height:1.4;
}

.auth-input{
  width:100%;
  box-sizing:border-box;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:#fff;
  outline:none;
  font-size:16px;
  margin-bottom:12px;
}

.auth-input::placeholder{
  color:rgba(255,255,255,0.65);
}

.auth-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.auth-btn{
  background:linear-gradient(135deg,#2ecc71,#27ae60);
  color:white;
  border:none;
  border-radius:14px;
  padding:14px 18px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:.25s ease;
  min-width:140px;
}

.auth-btn:hover{
  transform:translateY(-2px);
}

.auth-btn.secondary{
  background:linear-gradient(135deg,#34495e,#2c3e50);
}

#authStatus{
  margin-top:14px;
  min-height:20px;
  font-weight:700;
  font-size:14px;
}

/* =========================
   CARDS
========================= */
.intro-card{
  width:min(900px, 100%);
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:40px 28px;
  backdrop-filter:blur(10px);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  text-align:center;
}

.intro-badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:18px;
  color:#dfefff;
}

.intro-title{
  margin:0;
  font-size:clamp(42px, 10vw, 100px);
  line-height:0.95;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 10px 30px rgba(0,0,0,.45);
}

.intro-sub{
  margin:18px auto 28px auto;
  max-width:700px;
  font-size:clamp(16px, 2.2vw, 24px);
  line-height:1.4;
  color:#e8f6ff;
  font-weight:500;
}

.intro-materials{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:24px auto 28px auto;
  max-width:700px;
}

.intro-material{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.intro-material img{
  width:100%;
  height:110px;
  object-fit:cover;
  display:block;
}

.intro-material span{
  display:block;
  padding:10px;
  font-size:14px;
  font-weight:700;
  color:#fff;
}

.intro-btn{
  background:linear-gradient(135deg,#2ecc71,#27ae60);
  color:white;
  border:none;
  border-radius:16px;
  padding:16px 28px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 15px 35px rgba(39,174,96,.28);
  transition:.25s ease;
}

.intro-btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 20px 45px rgba(39,174,96,.38);
}

@media (max-width:700px){
  .intro-materials{
    grid-template-columns:1fr;
  }
}

.container {
  position:relative;
  z-index:1;
  max-width:1000px;
  margin:auto;
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
}

h1 { margin-top:0;font-size:30px;}
h3 { margin-bottom:10px;}

#room {
  max-width:100%;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  cursor:crosshair;
}

#dot {
  position:absolute;
  width:14px;
  height:14px;
  background:#2ecc71;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.materials {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:15px;
}

.material {
  background:#1e1e1e;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
  transition:.25s ease;
}

.material:hover {
  transform:translateY(-4px);
}

.material.selected {
  border-color:#2ecc71;
  box-shadow:0 0 0 3px rgba(46,204,113,.4);
}

.material img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.material .label {
  padding:10px;
  text-align:center;
  font-weight:600;
}

#coords { margin:10px 0;font-weight:600;}

.upload-buttons {
  display:flex;
  gap:12px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.btn-modern {
  background:linear-gradient(135deg,#2ecc71,#27ae60);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  border:none;
  font-size:14px;
  transition:.2s ease;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.btn-modern:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}

button:disabled {
  background:#555 !important;
  cursor:not-allowed;
  opacity:.8;
}

#status { margin-top:10px;font-weight:600;}

#result {
  display:none;
  margin-top:20px;
  max-width:100%;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="introScreen">
  <div class="intro-card">
    <div class="intro-badge">SURFACE AI EXPERIENCE</div>
    <h1 class="intro-title">SURFACE AI</h1>
    <p class="intro-sub">Cliqui per poder canviar els materials</p>

    <div class="intro-materials">
      <div class="intro-material">
        <img src="materials/parquet.jpg" alt="Parquet">
        <span>Parquet</span>
      </div>
      <div class="intro-material">
        <img src="materials/rajola_gris.jpg" alt="Rajola junta grossa">
        <span>Rajola junta grossa</span>
      </div>
      <div class="intro-material">
        <img src="materials/rajola_gris1.jpg" alt="Rajola junta fina">
        <span>Rajola junta fina</span>
      </div>
    </div>

    <button id="enterAppBtn" class="intro-btn">Entrar</button>
  </div>
</div>

<!-- LOGIN / VERIFY -->
<div id="authScreen">
  <div class="auth-card">
    <h2 class="auth-title" id="authTitle">Accés Surface AI</h2>
    <p class="auth-sub" id="authSub">Introdueix el teu correu electrònic per continuar.</p>

    <div id="emailStep">
      <input type="email" id="emailInput" class="auth-input" placeholder="El teu Gmail">
      <div class="auth-row">
        <button id="sendCodeBtn" class="auth-btn">Enviar codi</button>
      </div>
    </div>

    <div id="codeStep" style="display:none;">
      <input type="text" id="codeInput" class="auth-input" placeholder="Codi de 5 dígits" maxlength="5" inputmode="numeric">
      <div class="auth-row">
        <button id="verifyCodeBtn" class="auth-btn">Verificar</button>
        <button id="backToEmailBtn" class="auth-btn secondary">Canviar Gmail</button>
      </div>
    </div>

    <p id="authStatus"></p>
  </div>
</div>

<div class="container">

<h1>Canvia el terra</h1>

<p id="accessStatus"></p>
<hr>

<h3>1️⃣ Foto de l’habitació</h3>

<div class="upload-buttons">
  <label class="btn-modern">
    📁 Seleccionar foto
    <input type="file" id="roomFile" accept="image/*" hidden>
  </label>

  <button type="button" id="openCamera" class="btn-modern">
    📷 Obrir càmera
  </button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

<div style="position:relative;">
  <img id="room">
  <div id="dot" hidden></div>
</div>

<p id="coords">X: — | Y: —</p>

<hr>

<h3>2️⃣ Tria el material</h3>
<div class="materials" id="materials"></div>

<p><b>Material seleccionat:</b> <span id="matName">—</span></p>

<button id="send" class="btn-modern" disabled>Enviar</button>

<p id="status"></p>
<img id="result">

</div>

<script>
/* =========================
   URLS N8N
========================= */
const WEBHOOK_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/Surface-ai";
const SEND_EMAIL_CODE_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/send-email-code";
const VERIFY_EMAIL_CODE_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/verify-email-code";
const CHECK_ACCESS_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/check-access-test"; // si tens production sense -test, canvia-ho aquí

/* =========================
   MATERIALS
========================= */
const MATERIALS = [
  { id:"parquet", name:"Parquet", file:"materials/parquet.jpg" },
  { id:"rajola_gris", name:"Rajola junta grossa", file:"materials/rajola_gris.jpg" },
  { id:"rajola_gris1", name:"Rajola junta fina", file:"materials/rajola_gris1.jpg" }
];

/* =========================
   STORAGE
========================= */
const STORAGE_EMAIL_KEY = "surface_ai_user_email";

/* =========================
   ELEMENTS
========================= */
const materialsDiv = document.getElementById("materials");
const matName = document.getElementById("matName");
const sendBtn = document.getElementById("send");
const status = document.getElementById("status");
const roomImg = document.getElementById("room");
const dot = document.getElementById("dot");
const coords = document.getElementById("coords");
const result = document.getElementById("result");

const introScreen = document.getElementById("introScreen");
const enterAppBtn = document.getElementById("enterAppBtn");

const authScreen = document.getElementById("authScreen");
const authTitle = document.getElementById("authTitle");
const authSub = document.getElementById("authSub");
const authStatus = document.getElementById("authStatus");
const emailStep = document.getElementById("emailStep");
const codeStep = document.getElementById("codeStep");
const emailInput = document.getElementById("emailInput");
const codeInput = document.getElementById("codeInput");
const sendCodeBtn = document.getElementById("sendCodeBtn");
const verifyCodeBtn = document.getElementById("verifyCodeBtn");
const backToEmailBtn = document.getElementById("backToEmailBtn");

/* =========================
   ESTAT APP
========================= */
let selectedMaterial = null;
let x = null, y = null;
let accessGranted = false;      // pot generar
let remainingAttempts = 0;
let currentUserEmail = null;

/* =========================
   PORTADA
========================= */
if (enterAppBtn) {
  enterAppBtn.onclick = async () => {
    introScreen.classList.add("hidden");
    await autoAccessFlow();
  };
}

/* =========================
   HELPERS
========================= */
function isScanMode(){
  const params = new URLSearchParams(window.location.search);
  return params.get("scan") === "1";
}

function saveEmail(email){
  if(email) localStorage.setItem(STORAGE_EMAIL_KEY, email);
}

function getSavedEmail(){
  return localStorage.getItem(STORAGE_EMAIL_KEY);
}

function clearSavedEmail(){
  localStorage.removeItem(STORAGE_EMAIL_KEY);
  currentUserEmail = null;
}

function showAuthEmailStep(message = "Introdueix el teu correu electrònic per continuar."){
  authTitle.textContent = "Accés Surface AI";
  authSub.textContent = message;
  authStatus.textContent = "";
  emailStep.style.display = "block";
  codeStep.style.display = "none";
  authScreen.classList.add("show");
}

function showAuthCodeStep(email){
  authTitle.textContent = "Verifica el teu accés";
  authSub.textContent = "Hem enviat un codi de 5 dígits a " + email;
  authStatus.textContent = "";
  emailStep.style.display = "none";
  codeStep.style.display = "block";
  authScreen.classList.add("show");
}

function hideAuth(){
  authScreen.classList.remove("show");
}

function setBlockedMessage(msg, color = "#e74c3c"){
  accessGranted = false;
  document.getElementById("accessStatus").textContent = msg;
  document.getElementById("accessStatus").style.color = color;
  validate();
}

function setAllowedMessage(usesLeft){
  accessGranted = true;
  remainingAttempts = Number(usesLeft ?? 0);
  document.getElementById("accessStatus").textContent = "Intents restants: " + remainingAttempts;
  document.getElementById("accessStatus").style.color = "#2ecc71";
  validate();
}

/* =========================
   NORMALITZAR RESPOSTES N8N
========================= */
function getPayload(data){
  return data?.data ?? data;
}

function parseCheckAccessResponse(data){
  const payload = getPayload(data);

  // flexible per si el workflow retorna camps diferents
  const usesLeft = Number(
    payload?.uses_left ??
    payload?.remaining_attempts ??
    0
  );

  const canGenerate =
    payload?.can_generate ??
    payload?.access_granted ??
    payload?.allowed ??
    payload?.success ??
    false;

  const message =
    payload?.message ??
    data?.message ??
    "";

  return {
    canGenerate: Boolean(canGenerate),
    usesLeft,
    message
  };
}

/* =========================
   N8N CALLS
========================= */
async function sendEmailCode(email){
  const res = await fetch(SEND_EMAIL_CODE_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  });

  if(!res.ok){
    throw new Error("No s'ha pogut enviar el codi");
  }

  return await res.json();
}

async function verifyEmailCode(email, code){
  const res = await fetch(VERIFY_EMAIL_CODE_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, code })
  });

  if(!res.ok){
    throw new Error("No s'ha pogut verificar el codi");
  }

  const data = await res.json();
  const payload = getPayload(data);

  const ok =
    payload?.success ??
    data?.success ??
    payload?.verified ??
    data?.verified ??
    false;

  return Boolean(ok);
}

async function checkAccess(email){
  const res = await fetch(CHECK_ACCESS_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  });

  if(!res.ok){
    throw new Error("No s'ha pogut comprovar l'accés");
  }

  const data = await res.json();
  return parseCheckAccessResponse(data);
}

/* =========================
   FLUX D'ACCÉS
========================= */
async function applyAccessForEmail(email){
  currentUserEmail = email;

  try {
    const access = await checkAccess(email);

    remainingAttempts = access.usesLeft;

    if(access.canGenerate){
      setAllowedMessage(access.usesLeft);
    } else {
      // ENTRA IGUAL A LA APP, PERÒ NO POT GENERAR
      accessGranted = false;
      document.getElementById("accessStatus").textContent =
        access.message ||
        "Se t'han acabat els intents o el temps. Torna a la nostra botiga i escaneja un nou QR o enllaç per continuar.";
      document.getElementById("accessStatus").style.color = "#f39c12";
      validate();
    }

  } catch(err){
    console.error("Error check-access:", err);

    // Per no trencar la UX, deixem entrar però sense generar
    accessGranted = false;
    remainingAttempts = 0;
    document.getElementById("accessStatus").textContent =
      "No s'ha pogut comprovar l'accés ara mateix. Torna-ho a provar.";
    document.getElementById("accessStatus").style.color = "#e67e22";
    validate();
  }
}

async function autoAccessFlow(){
  const scanMode = isScanMode();
  const savedEmail = getSavedEmail();

  // CAS 1: ve de botiga / QR / link nou -> SEMPRE demana Gmail
  if(scanMode){
    clearSavedEmail();
    showAuthEmailStep("Introdueix el teu Gmail per rebre un codi de verificació i començar.");
    return;
  }

  // CAS 2: entra des de casa sense scan
  if(savedEmail){
    currentUserEmail = savedEmail;
    await applyAccessForEmail(savedEmail);
    return;
  }

  // CAS 3: no hi ha email guardat i no ve de scan
  // No bloquegem la pàgina, però mostrem missatge
  setBlockedMessage("Escaneja el QR o obre l’enllaç de la botiga per començar.", "#e67e22");
}

/* =========================
   EVENTS AUTH
========================= */
sendCodeBtn.onclick = async () => {
  const email = (emailInput.value || "").trim().toLowerCase();

  if(!email){
    authStatus.textContent = "Introdueix un correu electrònic.";
    authStatus.style.color = "#e74c3c";
    return;
  }

  authStatus.textContent = "Enviant codi...";
  authStatus.style.color = "#dfefff";
  sendCodeBtn.disabled = true;

  try {
    await sendEmailCode(email);
    currentUserEmail = email;
    showAuthCodeStep(email);
  } catch(err){
    console.error(err);
    authStatus.textContent = "Error enviant el codi ❌";
    authStatus.style.color = "#e74c3c";
  } finally {
    sendCodeBtn.disabled = false;
  }
};

verifyCodeBtn.onclick = async () => {
  const email = (currentUserEmail || "").trim().toLowerCase();
  const code = (codeInput.value || "").trim();

  if(!email){
    authStatus.textContent = "Falta el correu electrònic.";
    authStatus.style.color = "#e74c3c";
    return;
  }

  if(!/^\d{5}$/.test(code)){
    authStatus.textContent = "El codi ha de tenir 5 dígits.";
    authStatus.style.color = "#e74c3c";
    return;
  }

  authStatus.textContent = "Verificant...";
  authStatus.style.color = "#dfefff";
  verifyCodeBtn.disabled = true;

  try {
    const ok = await verifyEmailCode(email, code);

    if(!ok){
      authStatus.textContent = "Codi incorrecte o caducat ❌";
      authStatus.style.color = "#e74c3c";
      return;
    }

    saveEmail(email);
    hideAuth();
    await applyAccessForEmail(email);

  } catch(err){
    console.error(err);
    authStatus.textContent = "Error verificant el codi ❌";
    authStatus.style.color = "#e74c3c";
  } finally {
    verifyCodeBtn.disabled = false;
  }
};

backToEmailBtn.onclick = () => {
  codeInput.value = "";
  showAuthEmailStep("Introdueix el teu Gmail per rebre un nou codi.");
};

/* =========================
   MATERIALS
========================= */
MATERIALS.forEach(m=>{
  const d=document.createElement("div");
  d.className="material";
  d.innerHTML=`<img src="${m.file}"><div class="label">${m.name}</div>`;
  d.onclick=()=>{
    document.querySelectorAll(".material").forEach(e=>e.classList.remove("selected"));
    d.classList.add("selected");
    selectedMaterial=m;
    matName.textContent=m.id;
    validate();
  };
  materialsDiv.appendChild(d);
});

document.getElementById("roomFile").onchange=e=>{
  const file = e.target.files[0];
  if(file){
    roomImg.src=URL.createObjectURL(file);
  }
  validate();
};

document.getElementById("openCamera").onclick=function(){
  document.getElementById("cameraInput").click();
};

document.getElementById("cameraInput").onchange=function(e){
  const file=e.target.files[0];
  if(file){
    roomImg.src=URL.createObjectURL(file);
    const dt=new DataTransfer();
    dt.items.add(file);
    document.getElementById("roomFile").files=dt.files;
    validate();
  }
};

roomImg.onclick=e=>{
  if(!roomImg.src) return;

  const r=roomImg.getBoundingClientRect();
  x=Math.round(e.clientX-r.left);
  y=Math.round(e.clientY-r.top);
  dot.style.left=x+"px";
  dot.style.top=y+"px";
  dot.hidden=false;
  coords.textContent=`X: ${x} | Y: ${y}`;
  validate();
};

/* =========================
   VALIDACIÓ BOTÓ ENVIAR
========================= */
function validate(){
  sendBtn.disabled = !(
    accessGranted &&
    remainingAttempts > 0 &&
    currentUserEmail &&
    selectedMaterial &&
    x !== null &&
    document.getElementById("roomFile").files[0]
  );
}

async function urlToFile(url,name){
  const r=await fetch(url);
  const b=await r.blob();
  return new File([b],name,{type:b.type});
}

/* =========================
   GENERAR IMATGE
========================= */
sendBtn.onclick=async()=>{
  if(!currentUserEmail){
    alert("Cal verificar el correu electrònic abans de continuar.");
    return;
  }

  if(!accessGranted || remainingAttempts <= 0){
    alert("Se t'han acabat els intents o el temps. Torna a la nostra botiga i escaneja un nou QR o enllaç per continuar.");
    return;
  }

  status.textContent="Processant...";
  sendBtn.disabled = true;

  const fd=new FormData();
  fd.append("email", currentUserEmail); // IMPORTANT: ara enviem email, no access_code
  fd.append("room_image",document.getElementById("roomFile").files[0]);
  fd.append("material_image",await urlToFile(selectedMaterial.file,selectedMaterial.id+".jpg"));
  fd.append("material_name",selectedMaterial.id);
  fd.append("x",x);
  fd.append("y",y);

  try {
    const res=await fetch(WEBHOOK_URL,{method:"POST",body:fd});

    if(!res.ok){
      throw new Error("Error al generar la imatge");
    }

    const blob=await res.blob();

    if(!blob || blob.size === 0){
      throw new Error("La resposta no conté imatge");
    }

    result.src=URL.createObjectURL(blob);
    result.style.display="block";
    status.textContent="Fet ✅";

    // Després de generar, refresquem estat real (per veure si ha baixat intents)
    try {
      await applyAccessForEmail(currentUserEmail);
    } catch(err){
      console.error("Error refrescant access:", err);
      validate();
    }

  } catch(err){
    console.error(err);
    status.textContent="Error ❌";
    validate();
  }
};
</script>

</body>
</html>
