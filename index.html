<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>Canvia el terra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family:"Segoe UI",Arial,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin:0;
  padding:20px;
  color:white;
  overflow-x:hidden;
}

/* Marca subtil de fons */
body::before{
  content:"SURFACE AI";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  font-weight:900;
  letter-spacing:12px;
  color:rgba(255,255,255,0.04);
  pointer-events:none;
  z-index:0;
}

/* =========================
   PORTADA
========================= */
#introScreen{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
    url('materials/rajola_gris1.jpg') center/cover no-repeat;
  transition:opacity .5s ease, visibility .5s ease;
}

#introScreen.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.intro-card{
  width:min(900px, 100%);
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:40px 28px;
  backdrop-filter:blur(10px);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  text-align:center;
}

.intro-badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:18px;
  color:#dfefff;
}

.intro-title{
  margin:0;
  font-size:clamp(42px, 10vw, 100px);
  line-height:0.95;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 10px 30px rgba(0,0,0,.45);
}

.intro-sub{
  margin:18px auto 28px auto;
  max-width:700px;
  font-size:clamp(16px, 2.2vw, 24px);
  line-height:1.4;
  color:#e8f6ff;
  font-weight:500;
}

.intro-materials{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:24px auto 28px auto;
  max-width:700px;
}

.intro-material{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.intro-material img{
  width:100%;
  height:110px;
  object-fit:cover;
  display:block;
}

.intro-material span{
  display:block;
  padding:10px;
  font-size:14px;
  font-weight:700;
  color:#fff;
}

.intro-btn{
  background:linear-gradient(135deg,#2ecc71,#27ae60);
  color:white;
  border:none;
  border-radius:16px;
  padding:16px 28px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 15px 35px rgba(39,174,96,.28);
  transition:.25s ease;
}

.intro-btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 20px 45px rgba(39,174,96,.38);
}

@media (max-width:700px){
  .intro-materials{
    grid-template-columns:1fr;
  }
}

.container {
  position:relative;
  z-index:1;
  max-width:1000px;
  margin:auto;
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
}

h1 { margin-top:0;font-size:30px;}
h3 { margin-bottom:10px;}

#room {
  max-width:100%;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  cursor:crosshair;
}

#dot {
  position:absolute;
  width:14px;
  height:14px;
  background:#2ecc71;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.materials {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:15px;
}

.material {
  background:#1e1e1e;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
  transition:.25s ease;
}

.material:hover {
  transform:translateY(-4px);
}

.material.selected {
  border-color:#2ecc71;
  box-shadow:0 0 0 3px rgba(46,204,113,.4);
}

.material img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.material .label {
  padding:10px;
  text-align:center;
  font-weight:600;
}

#coords { margin:10px 0;font-weight:600;}

.upload-buttons {
  display:flex;
  gap:12px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.btn-modern {
  background:linear-gradient(135deg,#2ecc71,#27ae60);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  border:none;
  font-size:14px;
  transition:.2s ease;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.btn-modern:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}

button:disabled {
  background:#555;
  cursor:not-allowed;
}

#status { margin-top:10px;font-weight:600;}

#result {
  display:none;
  margin-top:20px;
  max-width:100%;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="introScreen">
  <div class="intro-card">
    <div class="intro-badge">SURFACE AI EXPERIENCE</div>
    <h1 class="intro-title">SURFACE AI</h1>
    <p class="intro-sub">Cliqui per poder canviar els materials</p>

    <div class="intro-materials">
      <div class="intro-material">
        <img src="materials/parquet.jpg" alt="Parquet">
        <span>Parquet</span>
      </div>
      <div class="intro-material">
        <img src="materials/rajola_gris.jpg" alt="Rajola junta grossa">
        <span>Rajola junta grossa</span>
      </div>
      <div class="intro-material">
        <img src="materials/rajola_gris1.jpg" alt="Rajola junta fina">
        <span>Rajola junta fina</span>
      </div>
    </div>

    <button id="enterAppBtn" class="intro-btn">Entrar</button>
  </div>
</div>

<div class="container">

<h1>Canvia el terra</h1>

<p id="accessStatus"></p>
<hr>

<h3>1️⃣ Foto de l’habitació</h3>

<div class="upload-buttons">
  <label class="btn-modern">
    📁 Seleccionar foto
    <input type="file" id="roomFile" accept="image/*" hidden>
  </label>

  <button type="button" id="openCamera" class="btn-modern">
    📷 Obrir càmera
  </button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

<div style="position:relative;">
  <img id="room">
  <div id="dot" hidden></div>
</div>

<p id="coords">X: — | Y: —</p>

<hr>

<h3>2️⃣ Tria el material</h3>
<div class="materials" id="materials"></div>

<p><b>Material seleccionat:</b> <span id="matName">—</span></p>

<button id="send" class="btn-modern" disabled>Enviar</button>

<p id="status"></p>
<img id="result">

</div>

<script>
const WEBHOOK_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/Surface-ai";
const VALIDATE_URL = "https://jan-n8n.4tpc2e.easypanel.host/webhook/validate-code";

const MATERIALS = [
  { id:"parquet", name:"Parquet", file:"materials/parquet.jpg" },
  { id:"rajola_gris", name:"Rajola junta grossa", file:"materials/rajola_gris.jpg" },
  { id:"rajola_gris1", name:"Rajola junta fina", file:"materials/rajola_gris1.jpg" }
];

const STORAGE_CODE_KEY = "surface_ai_access_code";

const materialsDiv = document.getElementById("materials");
const matName = document.getElementById("matName");
const sendBtn = document.getElementById("send");
const status = document.getElementById("status");
const roomImg = document.getElementById("room");
const dot = document.getElementById("dot");
const coords = document.getElementById("coords");
const result = document.getElementById("result");

const introScreen = document.getElementById("introScreen");
const enterAppBtn = document.getElementById("enterAppBtn");

let selectedMaterial = null;
let x = null, y = null;
let accessGranted = false;
let remainingAttempts = 0;
let currentAccessCode = null;

/* PORTADA */
if (enterAppBtn) {
  enterAppBtn.onclick = () => {
    introScreen.classList.add("hidden");
  };
}

/* ACCÉS */
function getCodeFromUrl(){
  const params = new URLSearchParams(window.location.search);
  return params.get("code");
}

function saveCode(code){
  if(code) localStorage.setItem(STORAGE_CODE_KEY, code);
}

function getSavedCode(){
  return localStorage.getItem(STORAGE_CODE_KEY);
}

function clearSavedCode(){
  localStorage.removeItem(STORAGE_CODE_KEY);
  currentAccessCode = null;
}

function clearCodeFromUrl(){
  window.history.replaceState({}, document.title, window.location.pathname);
}

function setBlockedMessage(msg, color = "#e74c3c"){
  accessGranted = false;
  remainingAttempts = 0;
  document.getElementById("accessStatus").textContent = msg;
  document.getElementById("accessStatus").style.color = color;
  validate();
}

function updateAccessUI(data){
  remainingAttempts = Number(
    data?.remaining_attempts ??
    data?.uses_left ??
    0
  );

  if(remainingAttempts <= 0){
    accessGranted = false;
    clearSavedCode();
    clearCodeFromUrl();

    document.getElementById("accessStatus").textContent =
      "Has esgotat els intents. Torna a escanejar un nou QR o obrir un nou enllaç de la botiga.";
    document.getElementById("accessStatus").style.color = "#e74c3c";
    validate();
    return;
  }

  accessGranted = true;
  document.getElementById("accessStatus").textContent =
    "Intents restants: " + remainingAttempts;
  document.getElementById("accessStatus").style.color = "#2ecc71";
}

async function validateCode(code){
  const res = await fetch(VALIDATE_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ code })
  });

  if(!res.ok){
    throw new Error("Resposta HTTP no OK de validate-code");
  }

  const data = await res.json();
  const payload = data?.data ?? data;

  const hasAttemptsField =
    payload?.remaining_attempts !== undefined ||
    payload?.uses_left !== undefined;

  if((data?.success || hasAttemptsField) && payload){
    updateAccessUI(payload);
    return true;
  }

  return false;
}

async function autoLogin() {
  const codeFromUrl = getCodeFromUrl();

  // 1) Si arriba un nou code per URL (escaneig nou), aquest SEMPRE guanya
  if(codeFromUrl){
    currentAccessCode = codeFromUrl;
    saveCode(codeFromUrl);
  } else {
    // 2) Si no hi ha code a URL, reutilitzem el guardat
    const savedCode = getSavedCode();

    if(!savedCode){
      setBlockedMessage("Escaneja el QR o obre l’enllaç de la botiga per començar.", "#e67e22");
      return;
    }

    currentAccessCode = savedCode;
  }

  // 3) Validem el codi actual (NOMÉS CONSULTA; NO HAURIA DE RESTAR)
  try {
    const ok = await validateCode(currentAccessCode);

    if(ok){
      // si venia per URL, netegem la URL després de guardar-lo
      if(codeFromUrl){
        clearCodeFromUrl();
      }
      validate();
    } else {
      clearSavedCode();
      clearCodeFromUrl();
      setBlockedMessage("Aquest accés ha caducat o ja no és vàlid. Torna a escanejar un nou QR o obrir un nou enllaç de la botiga.");
    }

  } catch(err){
    console.error("Error validant codi:", err);
    setBlockedMessage("No s'ha pogut validar l'accés ara mateix.", "#e67e22");
  }
}

window.onload = autoLogin;

/* MATERIALS */
MATERIALS.forEach(m=>{
  const d=document.createElement("div");
  d.className="material";
  d.innerHTML=`<img src="${m.file}"><div class="label">${m.name}</div>`;
  d.onclick=()=>{
    document.querySelectorAll(".material").forEach(e=>e.classList.remove("selected"));
    d.classList.add("selected");
    selectedMaterial=m;
    matName.textContent=m.id;
    validate();
  };
  materialsDiv.appendChild(d);
});

document.getElementById("roomFile").onchange=e=>{
  const file = e.target.files[0];
  if(file){
    roomImg.src=URL.createObjectURL(file);
  }
  validate();
};

document.getElementById("openCamera").onclick=function(){
  document.getElementById("cameraInput").click();
};

document.getElementById("cameraInput").onchange=function(e){
  const file=e.target.files[0];
  if(file){
    roomImg.src=URL.createObjectURL(file);
    const dt=new DataTransfer();
    dt.items.add(file);
    document.getElementById("roomFile").files=dt.files;
    validate();
  }
};

roomImg.onclick=e=>{
  if(!roomImg.src) return;

  const r=roomImg.getBoundingClientRect();
  x=Math.round(e.clientX-r.left);
  y=Math.round(e.clientY-r.top);
  dot.style.left=x+"px";
  dot.style.top=y+"px";
  dot.hidden=false;
  coords.textContent=`X: ${x} | Y: ${y}`;
  validate();
};

function validate(){
  sendBtn.disabled = !(
    accessGranted &&
    remainingAttempts > 0 &&
    selectedMaterial &&
    x !== null &&
    document.getElementById("roomFile").files[0]
  );
}

async function urlToFile(url,name){
  const r=await fetch(url);
  const b=await r.blob();
  return new File([b],name,{type:b.type});
}

sendBtn.onclick=async()=>{
  if(!accessGranted || remainingAttempts <= 0 || !currentAccessCode){
    alert("Accés no disponible o sense intents.");
    return;
  }

  status.textContent="Processant...";

  // Evitem doble clic / doble consum accidental
  sendBtn.disabled = true;

  const fd=new FormData();
  fd.append("access_code", currentAccessCode);
  fd.append("room_image",document.getElementById("roomFile").files[0]);
  fd.append("material_image",await urlToFile(selectedMaterial.file,selectedMaterial.id+".jpg"));
  fd.append("material_name",selectedMaterial.id);
  fd.append("x",x);
  fd.append("y",y);

  try {
    const res=await fetch(WEBHOOK_URL,{method:"POST",body:fd});

    if(!res.ok){
      throw new Error("Error al generar la imatge");
    }

    const blob=await res.blob();

    // Si per algun motiu no arriba imatge real
    if(!blob || blob.size === 0){
      throw new Error("La resposta no conté imatge");
    }

    result.src=URL.createObjectURL(blob);
    result.style.display="block";
    status.textContent="Fet ✅";

    // Només després que la imatge arribi bé, refresquem intents
    // (això només consulta; el descompte real ha d'estar a Surface-ai)
    try {
      const ok = await validateCode(currentAccessCode);

      if(!ok){
        clearSavedCode();
        clearCodeFromUrl();
        setBlockedMessage("Aquest accés ha caducat o ja no és vàlid. Torna a la botiga i escaneja un nou QR o enllaç.");
      } else {
        validate();
      }

    } catch(err){
      console.error("Error refrescant intents:", err);
      // No trenquem l'experiència si falla el refresc visual
      validate();
    }

  } catch(err){
    console.error(err);
    status.textContent="Error ❌";
    // Rehabilitem si hi ha error, sense gastar res des del front
    validate();
  }
};
</script>

</body>
</html>
